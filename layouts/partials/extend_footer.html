{{ if .IsPage }}
  <script>
    (function() {
      const bar = document.getElementById("read-progress");
      if (!bar) return;

      let ticking = false;

      const updateProgress = () => {
        const winScroll = window.pageYOffset || document.documentElement.scrollTop;
        const height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
        const scrolled = height > 0 ? (winScroll / height) : 0;
        
        // Using transform: [scaleX] significantly outperforms [width] because it is processed on the GPU layer.
        bar.style.transform = `scaleX(${scrolled})`;
        ticking = false;
      };

      window.addEventListener('scroll', function() {
        if (!ticking) {
          // Optimize with requestAnimationFrame to prevent lag caused by frequent scroll events.
          window.requestAnimationFrame(updateProgress);
          ticking = true;
        }
      }, { passive: true });
    })();
  </script>
{{ end }}

<!-- Mobile menu drawer toggle. The JS only flips two state flags;
     all show/hide and icon-swap rules live in assets/css/extended/header.css,
     which reads `.nav[data-menu-open="true"]` via attribute selectors. -->
<script>
  (function () {
    const btn = document.getElementById('menu-toggle');
    const nav = document.querySelector('.nav');
    if (!btn || !nav) return;

    btn.addEventListener('click', () => {
      const open = nav.getAttribute('data-menu-open') === 'true';
      // data-menu-open drives CSS; aria-expanded mirrors it for screen readers.
      nav.setAttribute('data-menu-open', String(!open));
      btn.setAttribute('aria-expanded', String(!open));
    });

    // Esc closes the drawer — keyboard parity with the close button.
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && nav.getAttribute('data-menu-open') === 'true') {
        nav.setAttribute('data-menu-open', 'false');
        btn.setAttribute('aria-expanded', 'false');
      }
    });
  })();
</script>
